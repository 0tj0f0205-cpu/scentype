<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Page</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 2L2 7v11h6v-5h4v5h6V7L10 2z" stroke="rgba(240,230,211,0.5)" stroke-width="1.2" fill="none"/>
      </svg>
    </div>
    <span class="header-title">SCENTYPE</span>
    <div class="header-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="5" r="1.5" fill="rgba(240,230,211,0.4)"/>
        <circle cx="10" cy="10" r="1.5" fill="rgba(240,230,211,0.4)"/>
        <circle cx="10" cy="15" r="1.5" fill="rgba(240,230,211,0.4)"/>
      </svg>
    </div>
  </div>

  <!-- 프로필 히어로 -->
  <div class="profile-hero">
    <div class="avatar-wrap">
      <div class="avatar" onclick="document.getElementById('file-input').click()">
        <img id="avatar-img" src="" alt="profile"/>
        <div class="avatar-placeholder" id="avatar-placeholder">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="opacity:0.4">
            <circle cx="14" cy="10" r="5" stroke="#c9a96e" stroke-width="1.5"/>
            <path d="M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="avatar-hint">사진 추가</span>
        </div>
      </div>
      <div class="avatar-badge" onclick="document.getElementById('file-input').click()">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M7.5 1.5L9.5 3.5M1.5 9.5l.5-2 6-6 2 2-6 6-2 .5z" stroke="#0e0b0f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*"/>

    <div class="profile-name">이름</div>
    <div class="profile-handle">@username</div>
    <div class="profile-joined">2025년 3월부터 함께함</div>

    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-num">0</span>
        <span class="stat-label">팔로잉</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">0</span>
        <span class="stat-label">팔로워</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">0</span>
        <span class="stat-label">향수</span>
      </div>
    </div>
  </div>

  <!-- 계정 정보 -->
  <div class="section">
    <div class="section-title">계정 정보</div>
    <div class="info-card">
      <div class="info-row">
        <span class="info-key">이름</span>
        <span class="info-val">이름</span>
      </div>
      <div class="info-row">
        <span class="info-key">계정</span>
        <span class="info-val">@username</span>
      </div>
      <div class="info-row">
        <span class="info-key">가입일</span>
        <span class="info-val">2025. 03. 01</span>
      </div>
      <div class="info-row">
        <span class="info-key">이메일</span>
        <span class="info-val">example@email.com</span>
      </div>
    </div>
  </div>


  <script src="my.js"></script>
</body>
</html>
