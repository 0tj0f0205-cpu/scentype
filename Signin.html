<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Signin</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="screen">
  <img src="assets/3.Signin/Signin.png" class="bg">

  <div class="input-field email2">
    <input type="text" placeholder="이메일을 입력하세요">
  </div>

  <div class="input-field password2">
    <input type="password" placeholder="비밀번호를 입력하세요">
  </div>
  
  <a href="9.홈/home.html">
   <img src="assets/3.Signin/Log in.png" class="btn login">
  </a>
  <img src="assets/3.Signin/visable.png" class="eye-password2">
  <img src="assets/3.Signin/Google.png" class="btn google">
  <img src="assets/3.Signin/Apple.png" class="btn apple">
  <img src="assets/3.Signin/Kakao.png" class="btn kakao">
 
  <a href="Signup.html">
    <img src="assets/3.Signin/회원가입.png" class="btn signup3">
  </a>
</div>

<script>
const eye = document.querySelector('.eye-password2');
const input = document.querySelector('.password2 input');

eye.addEventListener('click', () => {
  input.type = input.type === 'password' ? 'text' : 'password';
});
</script>

</body>
</html>

<img src="assets/2.Signup/visable.png" style="width:50px;">
